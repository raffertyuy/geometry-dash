<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1f1f29" />
    <title>The Real Geometry Dash</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1f1f29;
        overflow: hidden;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #e8e8ef;
        touch-action: none;
        overscroll-behavior: none;
      }

      #game-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
        background: rgba(15, 15, 23, 0.65);
        backdrop-filter: blur(2px);
        z-index: 10;
        pointer-events: none;
      }

      .overlay.hidden {
        display: none;
      }

      .overlay h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        margin: 0 0 0.4em 0;
        color: #22cc88;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .overlay p {
        font-size: clamp(1rem, 2.4vw, 1.4rem);
        margin: 0 0 0.4em 0;
        color: #e8e8ef;
      }

      .overlay p.hint {
        color: #9090a0;
        font-size: clamp(0.85rem, 1.8vw, 1.05rem);
        white-space: pre-line;
        line-height: 1.5;
      }

      #debug-overlay {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 20;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.6);
        color: #e8e8ef;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.45;
        white-space: pre;
        pointer-events: none;
        border-radius: 4px;
      }

      #debug-overlay.hidden {
        display: none;
      }

      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 16px 20px;
        pointer-events: none;
        color: #e8e8ef;
        text-shadow: 0 0 8px rgba(24, 200, 255, 0.45);
        gap: 12px;
      }

      #timer {
        flex: 1 1 auto;
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(1.4rem, 4vw, 2.2rem);
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #18c8ff;
        order: 2;
      }

      #score {
        flex: 0 0 auto;
        min-width: 4ch;
        text-align: right;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(1.4rem, 4vw, 2.2rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #ff8a30;
        order: 3;
      }

      #lives-hud {
        flex: 0 0 auto;
        order: 1;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .heart {
        display: inline-block;
        width: clamp(20px, 5vw, 28px);
        height: clamp(20px, 5vw, 28px);
        line-height: 0;
      }

      .heart svg {
        width: 100%;
        height: 100%;
        fill: #ff3360;
        stroke: #ff7090;
        stroke-width: 1.5;
        stroke-linejoin: miter;
        filter: drop-shadow(0 0 6px rgba(255, 51, 96, 0.6));
        transition: fill 120ms ease-out, filter 120ms ease-out;
      }

      .heart.empty svg {
        fill: transparent;
        filter: drop-shadow(0 0 3px rgba(255, 51, 96, 0.35));
      }

      .game-over-stat {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(1.6rem, 5vw, 2.6rem);
        font-weight: 700;
        margin: 0 0 0.6em 0;
        letter-spacing: 0.04em;
      }

      #game-over-score {
        color: #ff8a30;
      }

      #game-over-timer {
        color: #18c8ff;
      }

      .hud-label {
        font-size: clamp(0.85rem, 1.8vw, 1.0rem);
        color: #9090a0;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin: 0 0 0.2em 0;
      }

      /* Problem-gate answer modal. Reuses the .overlay base for the
         backdrop; adds its own panel-style layout for the question text
         and the three tappable answer choices. */
      #problem-modal {
        align-items: center;
        justify-content: center;
        gap: 16px;
        pointer-events: auto;
      }

      #problem-modal .problem-difficulty {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(0.85rem, 2vw, 1.1rem);
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-shadow: 0 0 6px currentColor;
      }

      #problem-modal .problem-text {
        font-size: clamp(1.1rem, 3vw, 1.6rem);
        font-weight: 600;
        max-width: min(94vw, 760px);
        color: #e8e8ef;
        line-height: 1.4;
      }

      /* Reserved slot for future geometry diagrams (SVG primitives or a
         pre-rendered figure). Currently empty - shown when populated.
         Sized to comfortably hold ~280 px wide diagrams alongside the
         question text without overflowing the modal panel. */
      #problem-modal .problem-figure {
        max-width: min(94vw, 720px);
        max-height: 40vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e8e8ef;
      }

      #problem-modal .problem-figure:empty {
        display: none;
      }

      #problem-modal .answer-choices {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: min(94vw, 560px);
      }

      #problem-modal .answer-choice {
        display: flex;
        align-items: center;
        gap: 14px;
        min-height: 48px;
        padding: 10px 16px;
        border: 1.5px solid rgba(24, 200, 255, 0.5);
        border-radius: 10px;
        background: rgba(15, 30, 50, 0.6);
        color: #e8e8ef;
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        font-weight: 500;
        cursor: pointer;
        user-select: none;
        transition: border-color 120ms ease-out, background 120ms ease-out, box-shadow 120ms ease-out;
      }

      #problem-modal .answer-choice .answer-letter {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 1.1em;
        font-weight: 700;
        color: #18c8ff;
        min-width: 1.2em;
        text-align: center;
      }

      #problem-modal .answer-choice.is-highlighted {
        border-color: #18c8ff;
        background: rgba(24, 200, 255, 0.18);
        box-shadow: 0 0 12px rgba(24, 200, 255, 0.45);
      }

      /* Floating "+1000" / "-5000" badges that drift up from the score
         readout when a problem gate resolves. Each badge is appended,
         then on the next frame gains .floating-score--rising which
         triggers the translateY + opacity transition. transitionend
         removes the element. */
      #floating-scores {
        position: fixed;
        top: clamp(48px, 6vh, 64px);
        right: 20px;
        z-index: 6;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }

      .floating-score {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(1.1rem, 3vw, 1.6rem);
        font-weight: 700;
        letter-spacing: 0.05em;
        text-shadow: 0 0 10px currentColor;
        transform: translateY(0);
        opacity: 1;
        transition: transform 1s ease-out, opacity 1s ease-out;
        will-change: transform, opacity;
      }

      .floating-score--green {
        color: #22cc88;
      }

      .floating-score--red {
        color: #ff5a5a;
      }

      .floating-score--rising {
        transform: translateY(-72px);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <div id="start-screen" class="overlay">
      <h1>The Real Geometry Dash</h1>
      <p>Press any key or tap to start</p>
      <p class="hint">Arrow keys / WASD on desktop
Swipe left or right on mobile</p>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <h1>Paused</h1>
      <p>Tap or press any key to resume</p>
    </div>

    <div id="hud">
      <div id="lives-hud" aria-label="Lives"></div>
      <div id="timer">0:00</div>
      <div id="score">0</div>
    </div>

    <div id="game-over-overlay" class="overlay hidden">
      <h1>Game Over</h1>
      <p class="hud-label">Score</p>
      <p class="game-over-stat" id="game-over-score">0</p>
      <p class="hud-label">Time</p>
      <p class="game-over-stat" id="game-over-timer">0:00</p>
      <p class="hint">Tap or press any key to play again</p>
    </div>

    <div id="problem-modal" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Problem"></div>

    <div id="floating-scores" aria-hidden="true"></div>

    <div id="debug-overlay" class="hidden"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

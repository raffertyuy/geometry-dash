<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1f1f29" />
    <title>The Real Geometry Dash</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1f1f29;
        overflow: hidden;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #e8e8ef;
        touch-action: none;
        overscroll-behavior: none;
      }

      #game-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
        background: rgba(15, 15, 23, 0.65);
        backdrop-filter: blur(2px);
        z-index: 10;
        pointer-events: none;
      }

      .overlay.hidden {
        display: none;
      }

      .overlay h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        margin: 0 0 0.4em 0;
        color: #22cc88;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .overlay p {
        font-size: clamp(1rem, 2.4vw, 1.4rem);
        margin: 0 0 0.4em 0;
        color: #e8e8ef;
      }

      .overlay p.hint {
        color: #9090a0;
        font-size: clamp(0.85rem, 1.8vw, 1.05rem);
        white-space: pre-line;
        line-height: 1.5;
      }

      #debug-overlay {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 20;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.6);
        color: #e8e8ef;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.45;
        white-space: pre;
        pointer-events: none;
        border-radius: 4px;
      }

      #debug-overlay.hidden {
        display: none;
      }

      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 16px 20px;
        pointer-events: none;
        color: #e8e8ef;
        text-shadow: 0 0 8px rgba(24, 200, 255, 0.45);
        gap: 12px;
      }

      #timer {
        flex: 1 1 auto;
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(1.4rem, 4vw, 2.2rem);
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #18c8ff;
        order: 2;
      }

      #score {
        flex: 0 0 auto;
        min-width: 4ch;
        text-align: right;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(1.4rem, 4vw, 2.2rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #ff8a30;
        order: 3;
      }

      #lives-hud {
        flex: 0 0 auto;
        order: 1;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .heart {
        display: inline-block;
        width: clamp(20px, 5vw, 28px);
        height: clamp(20px, 5vw, 28px);
        line-height: 0;
      }

      .heart svg {
        width: 100%;
        height: 100%;
        fill: #ff3360;
        stroke: #ff7090;
        stroke-width: 1.5;
        stroke-linejoin: miter;
        filter: drop-shadow(0 0 6px rgba(255, 51, 96, 0.6));
        transition: fill 120ms ease-out, filter 120ms ease-out;
      }

      .heart.empty svg {
        fill: transparent;
        filter: drop-shadow(0 0 3px rgba(255, 51, 96, 0.35));
      }

      .game-over-stat {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(1.6rem, 5vw, 2.6rem);
        font-weight: 700;
        margin: 0 0 0.6em 0;
        letter-spacing: 0.04em;
      }

      #game-over-score {
        color: #ff8a30;
      }

      #game-over-timer {
        color: #18c8ff;
      }

      .hud-label {
        font-size: clamp(0.85rem, 1.8vw, 1.0rem);
        color: #9090a0;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin: 0 0 0.2em 0;
      }

      /* Problem-gate answer modal. Reuses the .overlay base for the
         backdrop; adds its own panel-style layout for the question text
         and the three tappable answer choices. */
      #problem-modal {
        align-items: center;
        justify-content: center;
        gap: 16px;
        pointer-events: auto;
      }

      #problem-modal .problem-difficulty {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(0.85rem, 2vw, 1.1rem);
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-shadow: 0 0 6px currentColor;
      }

      #problem-modal .countdown-question {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-variant-numeric: tabular-nums;
        font-size: clamp(1.4rem, 3.4vw, 1.8rem);
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #c8c8d8;
        text-align: center;
      }

      #problem-modal .countdown-question--urgent {
        color: #ff4455;
        text-shadow: 0 0 10px rgba(255, 68, 85, 0.6);
        animation: question-countdown-pulse 1s ease-in-out infinite;
      }

      @keyframes question-countdown-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%      { transform: scale(1.06); opacity: 0.85; }
      }

      #problem-modal .problem-text {
        font-size: clamp(1.1rem, 3vw, 1.6rem);
        font-weight: 600;
        max-width: min(94vw, 760px);
        color: #e8e8ef;
        line-height: 1.4;
      }

      /* Diagram slot. Filled by the modal renderer with an inline SVG
         when problem.figure is set; hidden via CSS :empty otherwise. */
      #problem-modal .problem-figure {
        max-width: min(94vw, 480px);
        max-height: 30vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e8e8ef;
      }

      #problem-modal .problem-figure:empty {
        display: none;
      }

      #problem-modal .problem-figure svg {
        max-width: 100%;
        max-height: 100%;
        height: auto;
        width: auto;
      }

      #problem-modal .answer-choices {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: min(94vw, 560px);
      }

      #problem-modal .answer-choice {
        display: flex;
        align-items: center;
        gap: 14px;
        min-height: 48px;
        padding: 10px 16px;
        border: 1.5px solid rgba(24, 200, 255, 0.5);
        border-radius: 10px;
        background: rgba(15, 30, 50, 0.6);
        color: #e8e8ef;
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        font-weight: 500;
        cursor: pointer;
        user-select: none;
        transition: border-color 120ms ease-out, background 120ms ease-out, box-shadow 120ms ease-out;
      }

      #problem-modal .answer-choice .answer-letter {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 1.1em;
        font-weight: 700;
        color: #18c8ff;
        min-width: 1.2em;
        text-align: center;
      }

      #problem-modal .answer-choice.is-highlighted {
        border-color: #18c8ff;
        background: rgba(24, 200, 255, 0.18);
        box-shadow: 0 0 12px rgba(24, 200, 255, 0.45);
      }

      /* Review-state styling: green correct / red incorrect feedback.
         Backdrop tints the .overlay's existing dark backdrop with a
         coloured wash. Answer choices get coloured outlines: the correct
         answer in green, the wrong pick in red. */
      #problem-modal.is-correct {
        background: rgba(34, 204, 136, 0.32);
      }

      #problem-modal.is-incorrect {
        background: rgba(255, 90, 90, 0.32);
      }

      #problem-modal.is-reviewing .answer-choice.is-correct-answer {
        border-color: #22cc88;
        background: rgba(34, 204, 136, 0.25);
        box-shadow: 0 0 18px rgba(34, 204, 136, 0.65);
      }

      #problem-modal.is-reviewing .answer-choice.is-wrong-pick {
        border-color: #ff5a5a;
        background: rgba(255, 90, 90, 0.25);
        box-shadow: 0 0 18px rgba(255, 90, 90, 0.65);
      }

      /* During reviewing, answer choices stop responding to hover and
         can't be re-picked. */
      #problem-modal.is-reviewing .answer-choice {
        cursor: default;
        pointer-events: none;
      }

      /* Review controls: visible in reviewing state only. */
      #problem-modal .review-controls {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: min(86vw, 480px);
        margin-top: 4px;
        pointer-events: auto;
      }

      #problem-modal.is-reviewing .review-controls {
        display: flex;
      }

      #problem-modal .review-feedback {
        font-size: clamp(1.4rem, 4vw, 2rem);
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-shadow: 0 0 12px currentColor;
      }

      #problem-modal.is-correct .review-feedback {
        color: #22cc88;
      }

      #problem-modal.is-incorrect .review-feedback {
        color: #ff5a5a;
      }

      #problem-modal .continue-button {
        font-family: inherit;
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 12px 32px;
        min-height: 48px;
        background: rgba(24, 200, 255, 0.22);
        color: #e8e8ef;
        border: 1.5px solid #18c8ff;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 0 12px rgba(24, 200, 255, 0.4);
        transition: background 120ms ease-out, box-shadow 120ms ease-out;
      }

      #problem-modal .continue-button:hover,
      #problem-modal .continue-button:focus {
        background: rgba(24, 200, 255, 0.4);
        box-shadow: 0 0 18px rgba(24, 200, 255, 0.65);
      }

      #problem-modal .auto-continue-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: clamp(0.85rem, 1.8vw, 1rem);
        color: #c0c0d0;
        cursor: pointer;
        user-select: none;
      }

      #problem-modal .auto-continue-checkbox {
        width: 18px;
        height: 18px;
        accent-color: #18c8ff;
        cursor: pointer;
      }

      #problem-modal .countdown-display {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(0.85rem, 1.8vw, 1rem);
        color: #9090a0;
        letter-spacing: 0.04em;
      }

      /* Floating "+1000" / "-5000" badges that drift up from the score
         readout when a problem gate resolves. Each badge is appended,
         then on the next frame gains .floating-score--rising which
         triggers the translateY + opacity transition. transitionend
         removes the element. */
      #floating-scores {
        position: fixed;
        top: clamp(48px, 6vh, 64px);
        right: 20px;
        z-index: 6;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }

      .floating-score {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(1.1rem, 3vw, 1.6rem);
        font-weight: 700;
        letter-spacing: 0.05em;
        text-shadow: 0 0 10px currentColor;
        transform: translateY(0);
        opacity: 1;
        transition: transform 1s ease-out, opacity 1s ease-out;
        will-change: transform, opacity;
      }

      .floating-score--green {
        color: #22cc88;
      }

      .floating-score--red {
        color: #ff5a5a;
      }

      .floating-score--rising {
        transform: translateY(-72px);
        opacity: 0;
      }

      /* Problem credits — a small Tron-cyan text button shown on the start
         and game-over overlays beneath the existing instructions. The
         parent .overlay has pointer-events: none for its children so the
         underlying canvas can still receive input; we re-enable it here. */
      .how-to-play-link {
        appearance: none;
        background: transparent;
        border: 1px solid rgba(24, 200, 255, 0.35);
        border-radius: 4px;
        color: #18c8ff;
        cursor: pointer;
        font: inherit;
        font-size: clamp(0.85rem, 1.8vw, 1.05rem);
        margin-top: 0.6em;
        padding: 0.45em 0.9em;
        pointer-events: auto;
        text-shadow: 0 0 4px rgba(24, 200, 255, 0.4);
        transition: background 120ms ease-out, border-color 120ms ease-out;
      }

      .how-to-play-link:hover,
      .how-to-play-link:focus-visible {
        background: rgba(24, 200, 255, 0.12);
        border-color: rgba(24, 200, 255, 0.7);
        outline: none;
      }

      /* How-to-Play overlay. Reuses .overlay backdrop. The .how-to-play-body
         is a centred scrollable panel containing three sections:
         General Rules / Problem Cubes / Credits. */
      #how-to-play-overlay {
        align-items: center;
        justify-content: center;
        padding: 1rem;
        pointer-events: auto;
      }

      #how-to-play-overlay .how-to-play-body {
        background: rgba(8, 12, 24, 0.95);
        border: 1px solid rgba(24, 200, 255, 0.35);
        border-radius: 8px;
        box-shadow: 0 0 24px rgba(24, 200, 255, 0.2);
        color: #e8e8ef;
        max-height: 80vh;
        max-width: min(92vw, 680px);
        overflow-y: auto;
        padding: 1.4rem 1.6rem 1.2rem;
        pointer-events: auto;
        position: relative;
        text-align: left;
        width: 100%;
      }

      #how-to-play-overlay h2 {
        color: #18c8ff;
        font-size: clamp(1.2rem, 3.4vw, 1.6rem);
        margin: 0 0 0.6em 0;
        text-shadow: 0 0 8px rgba(24, 200, 255, 0.4);
      }

      #how-to-play-overlay .htp-section {
        margin: 0 0 1.4em 0;
      }

      #how-to-play-overlay .htp-section h3 {
        color: #18c8ff;
        font-size: clamp(1rem, 2.6vw, 1.2rem);
        letter-spacing: 0.04em;
        margin: 0 0 0.5em 0;
        text-transform: uppercase;
        text-shadow: 0 0 6px rgba(24, 200, 255, 0.3);
      }

      #how-to-play-overlay .htp-general-rules ul {
        color: #c8c8d8;
        display: flex;
        flex-direction: column;
        font-size: clamp(0.88rem, 2vw, 1rem);
        gap: 0.5em;
        line-height: 1.4;
        list-style: disc;
        margin: 0;
        padding-left: 1.4em;
      }

      #how-to-play-overlay .htp-cubes-intro {
        color: #c0c0d0;
        font-size: clamp(0.85rem, 1.9vw, 0.95rem);
        margin: 0 0 0.8em 0;
      }

      #how-to-play-overlay .htp-cube-rows {
        display: flex;
        flex-direction: column;
        gap: 0.9em;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      #how-to-play-overlay .htp-cube-row {
        align-items: flex-start;
        display: grid;
        gap: 0.9em;
        grid-template-columns: 44px 1fr;
      }

      /* Tron-style 2D cube icon: neon hexagonal silhouette + faint
         internal Y edges + a bright "?" in the middle. The per-difficulty
         colour flows in via the inline `--cube-color` custom property and
         is applied to the SVG via `color` (so SVG stroke=currentColor and
         the drop-shadow inherits the same hue). Static — no rotation. */
      #how-to-play-overlay .cube-icon {
        color: var(--cube-color);
        display: inline-block;
        filter: drop-shadow(0 0 4px var(--cube-color));
        height: 44px;
        margin-top: 0.05em;
        width: 44px;
      }

      #how-to-play-overlay .cube-icon svg {
        display: block;
        height: 100%;
        width: 100%;
      }

      #how-to-play-overlay .htp-cube-text {
        color: #e8e8ef;
        display: flex;
        flex-direction: column;
        gap: 0.2em;
        font-size: clamp(0.85rem, 1.9vw, 0.95rem);
      }

      #how-to-play-overlay .htp-cube-label {
        color: #e8e8ef;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      #how-to-play-overlay .htp-cube-description {
        color: #c0c0d0;
        line-height: 1.35;
        margin: 0;
      }

      #how-to-play-overlay .htp-cube-stats {
        color: #9090a0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(0.8rem, 1.7vw, 0.9rem);
        letter-spacing: 0.03em;
      }

      @media (max-width: 360px) {
        #how-to-play-overlay .htp-cube-row {
          grid-template-columns: 1fr;
        }
        #how-to-play-overlay .cube-swatch {
          margin-top: 0;
        }
      }

      #how-to-play-overlay .credits-intro {
        color: #c0c0d0;
        font-size: clamp(0.9rem, 2vw, 1rem);
        margin: 0 0 1em 0;
      }

      #how-to-play-overlay .credits-list {
        display: flex;
        flex-direction: column;
        gap: 1em;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      #how-to-play-overlay .source-entry {
        border-left: 2px solid rgba(24, 200, 255, 0.35);
        display: flex;
        flex-direction: column;
        gap: 0.25em;
        padding: 0.2em 0 0.2em 0.8em;
      }

      #how-to-play-overlay .source-name {
        color: #e8e8ef;
        font-size: clamp(0.95rem, 2.2vw, 1.05rem);
        font-weight: 600;
      }

      #how-to-play-overlay .source-url {
        color: #18c8ff;
        font-size: clamp(0.8rem, 1.7vw, 0.9rem);
        text-decoration: underline;
        word-break: break-all;
      }

      #how-to-play-overlay .source-url:hover,
      #how-to-play-overlay .source-url:focus-visible {
        color: #6be5ff;
        outline: none;
      }

      #how-to-play-overlay .source-license {
        color: #9090a0;
        font-size: clamp(0.8rem, 1.7vw, 0.9rem);
      }

      #how-to-play-overlay .source-attribution {
        color: #c0c0d0;
        font-size: clamp(0.8rem, 1.7vw, 0.9rem);
        font-style: italic;
      }

      #how-to-play-overlay .close-button {
        appearance: none;
        background: transparent;
        border: none;
        color: #9090a0;
        cursor: pointer;
        font-size: 1.4rem;
        line-height: 1;
        padding: 0.2em 0.5em;
        position: absolute;
        right: 0.5em;
        top: 0.4em;
        transition: color 120ms ease-out;
      }

      #how-to-play-overlay .close-button:hover,
      #how-to-play-overlay .close-button:focus-visible {
        color: #18c8ff;
        outline: none;
      }

      /* Pause button — top-centre HUD affordance shown only during an
         active run. Disabled state applies during gate modals + respawn
         invincibility, conveyed visually by reduced opacity + no-cursor. */
      .pause-button {
        appearance: none;
        background: rgba(8, 12, 24, 0.7);
        border: 1px solid rgba(24, 200, 255, 0.45);
        border-radius: 6px;
        color: #18c8ff;
        cursor: pointer;
        font-size: clamp(1rem, 2.4vw, 1.25rem);
        left: 50%;
        line-height: 1;
        padding: 0.3em 0.7em;
        pointer-events: auto;
        position: fixed;
        top: clamp(8px, 1.5vh, 16px);
        transform: translateX(-50%);
        transition: background 120ms ease-out, border-color 120ms ease-out, opacity 120ms ease-out;
        z-index: 5;
      }

      .pause-button:hover,
      .pause-button:focus-visible {
        background: rgba(24, 200, 255, 0.16);
        border-color: rgba(24, 200, 255, 0.8);
        outline: none;
      }

      .pause-button[disabled],
      .pause-button.is-disabled {
        cursor: not-allowed;
        opacity: 0.35;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <div id="start-screen" class="overlay">
      <h1>The Real Geometry Dash</h1>
      <p>Press any key or tap to start</p>
      <p class="hint">Arrow keys / WASD on desktop
Swipe left or right on mobile</p>
      <button id="how-to-play-link-start" class="how-to-play-link" type="button">How to Play</button>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <h1>Paused</h1>
      <p>Tap or press any key to resume</p>
    </div>

    <div id="hud">
      <div id="lives-hud" aria-label="Lives"></div>
      <div id="timer">0:00</div>
      <div id="score">0</div>
    </div>

    <div id="game-over-overlay" class="overlay hidden">
      <h1>Game Over</h1>
      <p class="hud-label">Score</p>
      <p class="game-over-stat" id="game-over-score">0</p>
      <p class="hud-label">Time</p>
      <p class="game-over-stat" id="game-over-timer">0:00</p>
      <p class="hint">Tap or press any key to play again</p>
      <button id="how-to-play-link-game-over" class="how-to-play-link" type="button">How to Play</button>
    </div>

    <div id="problem-modal" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Problem"></div>

    <div id="how-to-play-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-label="How to Play"></div>

    <button id="pause-button" class="pause-button hidden" type="button" aria-label="Pause" disabled>⏸</button>

    <div id="floating-scores" aria-hidden="true"></div>

    <div id="debug-overlay" class="hidden"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1f1f29" />
    <title>The Real Geometry Dash</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1f1f29;
        overflow: hidden;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #e8e8ef;
        touch-action: none;
        overscroll-behavior: none;
      }

      #game-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
        background: rgba(15, 15, 23, 0.65);
        backdrop-filter: blur(2px);
        z-index: 10;
        pointer-events: none;
      }

      .overlay.hidden {
        display: none;
      }

      .overlay h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        margin: 0 0 0.4em 0;
        color: #22cc88;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .overlay p {
        font-size: clamp(1rem, 2.4vw, 1.4rem);
        margin: 0 0 0.4em 0;
        color: #e8e8ef;
      }

      .overlay p.hint {
        color: #9090a0;
        font-size: clamp(0.85rem, 1.8vw, 1.05rem);
        white-space: pre-line;
        line-height: 1.5;
      }

      #debug-overlay {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 20;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.6);
        color: #e8e8ef;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.45;
        white-space: pre;
        pointer-events: none;
        border-radius: 4px;
      }

      #debug-overlay.hidden {
        display: none;
      }

      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 16px 20px;
        pointer-events: none;
        color: #e8e8ef;
        text-shadow: 0 0 8px rgba(24, 200, 255, 0.45);
      }

      #timer {
        flex: 1 1 auto;
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(1.4rem, 4vw, 2.2rem);
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #18c8ff;
        order: 2;
      }

      #score {
        flex: 0 0 auto;
        min-width: 4ch;
        text-align: right;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: clamp(1.4rem, 4vw, 2.2rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #ff8a30;
        order: 3;
      }

      #hud::before {
        /* Spacer to balance the score on the left so the timer stays
           visually centred. */
        content: '';
        flex: 0 0 4ch;
        order: 1;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <div id="start-screen" class="overlay">
      <h1>The Real Geometry Dash</h1>
      <p>Press any key or tap to start</p>
      <p class="hint">Arrow keys / WASD on desktop
Swipe left or right on mobile</p>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <h1>Paused</h1>
      <p>Tap or press any key to resume</p>
    </div>

    <div id="hud">
      <div id="timer">0:00</div>
      <div id="score">0</div>
    </div>

    <div id="debug-overlay" class="hidden"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
